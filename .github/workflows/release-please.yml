name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Keeps a "release" PR open that bumps version.txt and the changelog from the Conventional Commits
  # merged to main. Merging that PR tags the release and creates the GitHub release.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # When a release is cut, publish it to Maven Central through the reusable release workflow.
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: ./.github/workflows/release.yml
    with:
      version: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
