name: Publish to Maven Central

on:
  # Manual tag push, or called by the release-please workflow when it cuts a release.
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'
  workflow_call:
    inputs:
      version:
        description: Version to publish. Defaults to the pushed tag.
        type: string
        required: false

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      # The tag is the version. github.ref_name is the tag (e.g. 0.1.0); Gradle maps
      # ORG_GRADLE_PROJECT_VERSION_NAME onto the VERSION_NAME property the publish plugin reads.
      - name: Publish
        run: ./gradlew publishToMavenCentral --no-configuration-cache --no-daemon
        env:
          ORG_GRADLE_PROJECT_VERSION_NAME: ${{ inputs.version || github.ref_name }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
